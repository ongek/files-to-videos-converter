name: "Native Mac ARM64 Lightweight Build"

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build JAR (Mac ARM64)
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java JDK 26
      uses: actions/setup-java@v4
      with:
        java-version: '26'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Tar & Zstd compression
      run: |
        tar cvf target.tar target
        zstd -T0 --max target.tar -o target.tar.zst

    - name: Archive Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FilesToVideosConverter-macos-arm64
        path: target.tar.zst
