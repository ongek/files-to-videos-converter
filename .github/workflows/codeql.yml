name: Verify Converter Integrity

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-verify:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 26
      uses: actions/setup-java@v4
      with:
        java-version: '26'
        distribution: 'oracle'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Prepare Test Workspace
      run: |
        mkdir -p test_workspace/in
        
        # 1. テスト用のランダムデータ（1MB）を生成
        dd if=/dev/urandom of=test_workspace/in/integrity_test_source.dat bs=1024 count=1024
        
        echo "=== SOURCE FILE SHA-256 ==="
        shasum -a 256 test_workspace/in/integrity_test_source.dat | tee test_workspace/source_hash.txt

    - name: Execute Files-To-Videos Conversion (Encode)
      run: |
        # 2. ファイル -> 動画変換
        # 出力先を固定するため、一時的に引数で指定した場所に書き出されるか、
        # またはデフォルト生成されるフォルダを後から特定します。
        java -jar -Xmx2048m -Xms2048m target/FilesToVideosConverter.jar -ftv -fp test_workspace/in -t 1
        
        echo "=== ENCODE COMPLETED ==="
        ls -la
        # 生成された「resultVideos〜」というフォルダ名を一意に特定して環境変数に保存
        VIDEO_DIR=$(ls -d resultVideos* | head -n 1)
        echo "VIDEO_DIR=$VIDEO_DIR" >> $GITHUB_ENV
        echo "Generated Video Directory: $VIDEO_DIR"
        ls -la "$VIDEO_DIR"

    - name: Execute Videos-To-Files Conversion (Decode)
      run: |
        # 3. 動画 -> ファイル逆変換
        # 【修正】動画からのデコード時は「-vtf」と「-vp <動画パス>」を使用します
        java -jar -Xmx2048m -Xms2048m target/FilesToVideosConverter.jar -vtf -vp "${{ env.VIDEO_DIR }}" -t 1
        
        echo "=== DECODE COMPLETED ==="
        ls -la
        # 生成された「resultFiles〜」というフォルダ名を一意に特定して環境変数に保存
        FILE_DIR=$(ls -d resultFiles* | head -n 1)
        echo "FILE_DIR=$FILE_DIR" >> $GITHUB_ENV
        echo "Generated Restored File Directory: $FILE_DIR"
        ls -la "$FILE_DIR"

    - name: Strict Integrity Verification (SHA-256 Check)
      run: |
        # 4. 復元されたファイルのパスを特定してハッシュ計算
        RESTORED_FILE="${{ env.FILE_DIR }}/integrity_test_source.dat"
        
        echo "=== RESTORED FILE SHA-256 ==="
        shasum -a 256 "$RESTORED_FILE" | awk '{print $1 "  test_workspace/in/integrity_test_source.dat"}' > test_workspace/restored_hash.txt
        
        echo "--------------------------------------------------"
        echo "Comparing Source Hash and Restored Hash..."
        echo "--------------------------------------------------"
        
        if diff test_workspace/source_hash.txt test_workspace/restored_hash.txt > /dev/null; then
          echo "✅ INTEGRITY PASSED: Files are 100% identical at bit-level!"
          exit 0
        else
          echo "❌ INTEGRITY FAILED: Bit mismatch detected between source and restored file!"
          
          echo "=== Hex diff of first 256 bytes ==="
          xxd -l 256 test_workspace/in/integrity_test_source.dat > test_workspace/src.hex
          xxd -l 256 "$RESTORED_FILE" > test_workspace/dec.hex
          diff -u test_workspace/src.hex test_workspace/dec.hex || true
          exit 1
        fi
