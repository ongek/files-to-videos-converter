- name: Execute Videos-To-Files Conversion (Decode)
      run: |
        # 動画 -> ファイル逆変換
        java -jar -Xmx2048m -Xms2048m target/FilesToVideosConverter.jar -vtf -vp "${{ env.VIDEO_DIR }}" -t 1
        
        echo "=== DECODE COMPLETED ==="
        ls -la
        
        # 【修正】検索範囲を「resultFiles*」の中だけに限定！
        # これにより、test_workspace/in の元ファイルに誤ってヒットするのを100%防ぎます。
        RESTORED_PATH=$(find resultFiles* -name "integrity_test_source.dat" 2>/dev/null | head -n 1)
        
        if [ -z "$RESTORED_PATH" ]; then
          echo "❌ ERROR: Restored file 'integrity_test_source.dat' was not found in resultFiles*!"
          echo "=== Directory State ==="
          ls -R
          exit 1
        fi
        
        echo "Found Real Restored File At: $RESTORED_PATH"
        echo "RESTORED_FILE_PATH=$RESTORED_PATH" >> $GITHUB_ENV

    - name: Strict Integrity Verification (SHA-256 Check)
      run: |
        # 復元された本物のファイルのハッシュ計算
        echo "=== RESTORED FILE SHA-256 ==="
        shasum -a 256 "${{ env.RESTORED_FILE_PATH }}" | awk '{print $1 "  test_workspace/in/integrity_test_source.dat"}' > test_workspace/restored_hash.txt
        
        echo "--------------------------------------------------"
        echo "Comparing Source Hash and Restored Hash..."
        echo "--------------------------------------------------"
        
        if diff test_workspace/source_hash.txt test_workspace/restored_hash.txt > /dev/null; then
          echo "✅ INTEGRITY PASSED: Files are 100% identical at bit-level!"
          exit 0
        else
          echo "❌ INTEGRITY FAILED: Bit mismatch detected between source and restored file!"
          
          echo "=== Hex diff of first 256 bytes ==="
          xxd -l 256 test_workspace/in/integrity_test_source.dat > test_workspace/src.hex
          xxd -l 256 "${{ env.RESTORED_FILE_PATH }}" > test_workspace/dec.hex
          diff -u test_workspace/src.hex test_workspace/dec.hex || true
          exit 1
        fi
