name: "Native Mac ARM64 Lightweight Build"

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 手動実行もできるようにトリガーを追加

jobs:
  build:
    name: Build JAR (Mac ARM64)
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Java JDK 26
      uses: actions/setup-java@v4
      with:
        java-version: '26'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    # =================================================================
    # 【追加】往復エンコード・デコード整合性確認フェーズ (30MB仕様)
    # =================================================================
    - name: Prepare Integrity Test Workspace
      run: |
        mkdir -p test_workspace/in
        
        # 30MB (1024KB * 30) のランダムなバイナリテストデータを動的に生成
        dd if=/dev/urandom of=test_workspace/in/integrity_test_source.dat bs=1024 count=30720
        
        echo "=== SOURCE FILE SHA-256 ==="
        shasum -a 256 test_workspace/in/integrity_test_source.dat | tee test_workspace/source_hash.txt

    - name: Execute Files-To-Videos Conversion (Encode)
      run: |
        # ビルドされたJARを使ってファイルから動画へ変換 (-t 1 でシングルスレッド安定テスト)
        java -jar -Xmx2048m -Xms2048m target/FilesToVideosConverter.jar -ftv -fp test_workspace/in -t 1
        
        echo "=== ENCODE COMPLETED ==="
        # 生成されたタイムスタンプ付きの動画フォルダを特定して環境変数にバインド
        VIDEO_DIR=$(ls -d resultVideos* | head -n 1)
        echo "VIDEO_DIR=$VIDEO_DIR" >> $GITHUB_ENV
        echo "Generated Video Directory: $VIDEO_DIR"
        ls -la "$VIDEO_DIR"

    - name: Execute Videos-To-Files Conversion (Decode)
      run: |
        # 特定した動画フォルダをインプットに指定し、動画からファイルへ逆変換
        java -jar -Xmx2048m -Xms2048m target/FilesToVideosConverter.jar -vtf -vp "${{ env.VIDEO_DIR }}" -t 1
        
        echo "=== DECODE COMPLETED ==="
        ls -la
        
        # 復元されたファイルが格納されている resultFiles* 内のパスを厳密に捕捉
        RESTORED_PATH=$(find resultFiles* -name "integrity_test_source.dat" 2>/dev/null | head -n 1)
        
        if [ -z "$RESTORED_PATH" ]; then
          echo "❌ ERROR: Restored file 'integrity_test_source.dat' was not found in resultFiles*!"
          echo "=== Directory State ==="
          ls -R
          exit 1
        fi
        
        echo "Found Real Restored File At: $RESTORED_PATH"
        echo "RESTORED_FILE_PATH=$RESTORED_PATH" >> $GITHUB_ENV

    - name: Strict Integrity Verification (SHA-256 Check)
      run: |
        echo "=== RESTORED FILE SHA-256 ==="
        shasum -a 256 "${{ env.RESTORED_FILE_PATH }}" | awk '{print $1 "  test_workspace/in/integrity_test_source.dat"}' > test_workspace/restored_hash.txt
        
        echo "--------------------------------------------------"
        echo "Comparing Source Hash and Restored Hash..."
        echo "--------------------------------------------------"
        
        # diffが不一致なら終了コード1でCIをここで落とす（以降のステップは実行されません）
        if diff test_workspace/source_hash.txt test_workspace/restored_hash.txt > /dev/null; then
          echo "✅ INTEGRITY PASSED: Files are 100% identical at bit-level!"
          exit 0
        else
          echo "❌ INTEGRITY FAILED: Bit mismatch detected between source and restored file!"
          
          echo "=== Hex diff of first 256 bytes ==="
          xxd -l 256 test_workspace/in/integrity_test_source.dat > test_workspace/src.hex
          xxd -l 256 "${{ env.RESTORED_FILE_PATH }}" > test_workspace/dec.hex
          diff -u test_workspace/src.hex test_workspace/dec.hex || true
          exit 1
        fi

    # =================================================================
    # 整合性が100%確認できた安全なビルド成果物のみを圧縮・保存
    # =================================================================
    - name: Tar & Zstd compression
      run: |
        tar cvf target.tar target

    - name: Archive Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FilesToVideosConverter-macos-arm64
        path: target.tar
